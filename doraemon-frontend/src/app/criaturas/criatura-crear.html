<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <h2>➕ Nueva Criatura</h2>
      <br/>

      @if (mensajeError) {
        <div class="alert alert-danger">{{ mensajeError }}</div>
      }

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="criatura.nombre" placeholder="Ej: Ignis" />
      </div>

      <div class="mb-3">
        <label class="form-label">Tipo</label>
        <select class="form-select" [(ngModel)]="criatura.tipo">
          <option value="">-- Selecciona un tipo --</option>
          @for (tipo of tiposValidos; track tipo) {
            <option [value]="tipo">{{ tipo }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">HP</label>
        <input type="number" class="form-control" [(ngModel)]="criatura.hp" min="1" placeholder="Ej: 120" />
      </div>

      <div class="mb-3">
        <label class="form-label">ATK</label>
        <input type="number" class="form-control" [(ngModel)]="criatura.atk" min="1" placeholder="Ej: 60" />
      </div>

      <div class="mb-3">
        <label class="form-label">DEF</label>
        <input type="number" class="form-control" [(ngModel)]="criatura.def" min="1" placeholder="Ej: 50" />
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-primary me-2" (click)="guardar()">Guardar</button>
        <button type="button" class="btn btn-secondary" routerLink="/criaturas">Cancelar</button>
      </div>

    </div>
  </div>
</div>
